databases:
  - name: wordlfr-db
    databaseName: wordlfr
    user: wordlfr
    plan: free

services:
  - type: web
    name: wordlfr
    runtime: node
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    buildCommand: "npm --prefix apps/web ci --include=dev && npm --prefix apps/web run build && npm --prefix apps/api ci --include=dev && npm --prefix apps/api run build"
    startCommand: "node apps/api/dist/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: wordlfr-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@wordlfr.app
      - key: ADMIN_PASSWORD
        generateValue: true
